<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數位教育指南：知識王 LIVE × Kahoot!</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* 為了配合 Star Hub 結構，微調 portal 卡片的樣式 */
    .portal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 60px;
      width: 100%;
    }
    @media (max-width: 900px) {
      .portal-grid {
        grid-template-columns: 1fr;
      }
    }
    .portal-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 30px 20px;
      text-align: center;
      transition: all var(--t) var(--ease);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .portal-card:hover {
      transform: translateY(-8px);
      border-color: var(--c1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--c1-glow);
    }
    .portal-card.card-2:hover { border-color: var(--c2); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--c2-glow); }
    .portal-card.card-3:hover { border-color: var(--c3); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,200,0.2); }
    
    .portal-icon { font-size: 3.5rem; margin-bottom: 24px; display: block; }
    .portal-card h2 { font-size: 1.5rem; margin-bottom: 16px; font-weight: 800; }
    .portal-card p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }
    .portal-link {
      margin-top: 24px;
      display: inline-block;
      font-weight: 700;
      color: var(--c1);
      transition: all 0.3s;
    }
    .card-2 .portal-link { color: var(--c2); }
    .card-3 .portal-link { color: var(--c3); }
    .portal-card:hover .portal-link { letter-spacing: 0.1em; }
  </style>
</head>
<body>

  <!-- 頂部閱讀進度條 -->
  <div id="progress-bar"></div>

  <!-- ── 導覽列 ── -->
  <nav id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">🏠 返回首頁</a>
      <div style="margin-left: auto; display: flex; align-items: center; gap: 16px;">
        <div class="font-ctrl">
          <button id="fontDecrease" title="縮小字體">A−</button>
          <button id="fontIncrease" title="放大字體">A+</button>
        </div>
        <button id="themeToggle" title="切換主題">🌙</button>
      </div>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <section id="hero" style="min-height: 90vh;">
    <div class="hero-shapes" aria-hidden="true">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
      <div class="shape s3"></div>
      <div class="shape s4"></div>
    </div>
    <div class="hero-content" style="max-width: 1000px;">
      <p class="hero-eyebrow">數位教育指南 · 知識王 vs Kahoot!</p>
      <h1 class="hero-title"><span id="typewriterEl"></span></h1>
      <p class="hero-sub">深度解析兩大益智學習平台，助您為學習者挑選最合適的互動工具。</p>
      
      <!-- Portal Cards (The Spokes) -->
      <div class="portal-grid">
        <a href="zhishiwang.html" class="portal-card card-1 reveal">
          <span class="portal-icon">🎮</span>
          <h2>《知識王 LIVE》深度解析</h2>
          <p>了解台灣在地開發的益智競技遊戲，探索其豐富的題庫與對戰機制。</p>
          <span class="portal-link">進入探索 →</span>
        </a>
        
        <a href="kahoot.html" class="portal-card card-2 reveal">
          <span class="portal-icon">🟪</span>
          <h2>《Kahoot!》深度解析</h2>
          <p>探索全球領先的遊戲化學習平台，分析其在教育現場的應用與優勢。</p>
          <span class="portal-link">進入探索 →</span>
        </a>
        
        <a href="compare.html" class="portal-card card-3 reveal">
          <span class="portal-icon">⚖️</span>
          <h2>產品綜合比較與篩選</h2>
          <p>從易用性、滿意度等七大維度，透過側邊欄篩選器進行精準對比。</p>
          <span class="portal-link">進入對比 →</span>
        </a>
      </div>
    </div>
  </section>

  <!-- ── Q&A 表單 ── -->
  <section id="support" class="section">
    <div class="container">
      <div class="contact-col reveal" style="max-width: 600px; margin: 0 auto; background: var(--bg-card); padding: 40px; border-radius: var(--r); border: 1px solid var(--border);">
        <h2 class="section-title text-center" style="margin-bottom: 32px;">有任何疑問嗎？</h2>
        <form id="contactForm" novalidate>
          <div class="field-group">
            <label for="fname">Email <span class="req">*</span></label>
            <input type="email" id="femail" placeholder="example@email.com" />
            <span class="field-err" id="femailErr"></span>
          </div>
          <div class="field-group">
            <label for="fmsg">您的問題或建議</label>
            <textarea id="fmsg" rows="4" placeholder="請描述您的疑問…"></textarea>
          </div>
          <button type="submit" class="btn-submit" style="width: 100%;">送出諮詢 →</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>使用者介面設計與評鑑 · 第二次作業</p>
      <p class="footer-sub">分析對象：知識王 LIVE · Kahoot!</p>
    </div>
  </footer>

  <!-- 返回頂部 -->
  <button id="backTop" aria-label="返回頂部">↑</button>

  <script src="script.js"></script>
</body>
</html>
